<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Gustambitos</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header class="header">
        <h1>Gustambitos</h1>
        <p>Selecciona los Gustambitos que has conseguido.</p>
    </header>
    
<main class="contenedor">

    <section class="progreso">

        <div class="texto-progreso">
            <span id="contador">0 / 0</span>
            <span id="porcentaje">0%</span>
        </div>

        <div class="barra">
            <div id="barra-progreso" class="barra-progreso"></div>
        </div>

    </section>

    <section class="columnas">

    <div class="columna">
        <h2>Categoría 1</h2>
        <div id="categoria1" class="grid-tarjetas"></div>
    </div>

    <div class="columna">
        <h2>Categoría 2</h2>
        <div id="categoria2" class="grid-tarjetas"></div>
    </div>

    <div class="columna">
        <h2>Categoría 3</h2>
        <div id="categoria3" class="grid-tarjetas"></div>
    </div>

    <div class="columna">
    <h2>Categoría 4</h2>
    <div id="categoria4" class="grid-tarjetas"></div>
</div>

<div class="columna">
    <h2>Categoría 5</h2>
    <div id="categoria5" class="grid-tarjetas"></div>
</div>
</section>

</main>

    <script src="script.js"></script>

</body>

</html>
